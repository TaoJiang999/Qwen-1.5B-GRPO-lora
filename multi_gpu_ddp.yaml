# accelerate_configs/multi_gpu_ddp.yaml
# 单机多卡 DDP 训练配置（无 ZeRO）
# 启动方式：accelerate launch --config_file accelerate_configs/multi_gpu_ddp.yaml sft_lora_qwen3.py

compute_environment: LOCAL_MACHINE
distributed_type: "MULTI_GPU"
mixed_precision: "bf16"
num_processes: 1               
num_machines: 1
machine_rank: 0
main_process_ip: null
main_process_port: 29500
main_training_function: main
downcast_bf16: "no"
gpu_ids: "all"
use_cpu: false
rdzv_backend: static
same_network: true